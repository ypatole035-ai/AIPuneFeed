<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pune Verified News</title><style>
body{
font-family: Arial, sans-serif;
background:#f4f4f4;
margin:0;
padding:0;
}

header{
background:#111;
color:white;
padding:20px;
text-align:center;
}

#verified-news{
max-width:900px;
margin:30px auto;
padding:10px;
}

.news-card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.news-card h3{
margin:0 0 10px 0;
font-size:18px;
}

.news-card p{
margin:5px 0;
color:#555;
font-size:14px;
}

.news-card a{
display:inline-block;
margin-top:10px;
color:#007BFF;
text-decoration:none;
font-weight:bold;
}

.news-card a:hover{
text-decoration:underline;
}
</style></head><body><header>
<h1>Pune Verified News</h1>
<p>Latest trusted news about Pune</p>
</header><div id="verified-news">
Loading latest Pune news...
</div><script>
async function loadNews(){

const container=document.getElementById("verified-news");

try{

const response=await fetch("https://e0d54977-8468-453a-83b5-0ce70b37e321-00-28n59oqee5h74.worf.replit.dev/verified-news");

const data=await response.json();

container.innerHTML="";

if(!data.articles || data.articles.length===0){
container.innerHTML="No news available right now.";
return;
}

data.articles.forEach(article=>{

const card=document.createElement("div");
card.className="news-card";

const title=document.createElement("h3");
title.textContent=article.title;

const source=document.createElement("p");
source.textContent="Source: "+article.source.name;

const date=document.createElement("p");
date.textContent="Published: "+new Date(article.publishedAt).toLocaleString();

const link=document.createElement("a");
link.href=article.url;
link.target="_blank";
link.textContent="Read Full Article";

card.appendChild(title);
card.appendChild(source);
card.appendChild(date);
card.appendChild(link);

container.appendChild(card);

});

}

catch(error){
console.error(error);
container.innerHTML="Failed to load news.";
}

}

document.addEventListener("DOMContentLoaded",loadNews);
</script></body>
</html>
