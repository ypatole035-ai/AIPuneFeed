<head>

<title>AIPune Feed</title>

</head>

<body>

<header>
<h1>AIPune Feed</h1>
<p>News Heartbeat of the City</p>
</header>


<!-- BREAKING NEWS BANNER -->

<section id="breaking-banner">
<marquee>🚨 Live Pune Updates • Traffic • Politics • Weather • Local Incidents • Civic Updates 🚨</marquee>
</section>


<!-- VERIFIED NEWS -->

<section class="verified-news">

<h2>Verified News</h2>

<div id="news-container">
<!-- AI will automatically insert verified news here -->
</div>

</section>


<!-- TRENDING / UNVERIFIED -->

<section class="trending-news">

<h2>Hot Trending Topics</h2>

<p>
⚠ These topics are trending online and may not yet be verified by official sources.
</p>

<div id="trending-container">
<!-- Future AI system will insert trending topics here -->
</div>

</section>


<footer>

<p>© 2026 AIPune Feed</p>
<p>News Heartbeat of the City</p>

</footer>


<script src="script.js"></script>
