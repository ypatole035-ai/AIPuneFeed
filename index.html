<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIPune Feed - News Heartbeat of the City</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- HEADER WITH LOGO -->
    <header>
        <img src="logo.png" alt="AIPune Feed Logo">
        <h1>AIPune Feed</h1>
        <p>News Heartbeat of the City</p>
    </header>

    <!-- BREAKING NEWS BANNER -->
    <section id="breaking-banner">
        🚨 Live Pune Updates • Traffic • Politics • Events
    </section>

    <!-- VERIFIED NEWS -->
    <section class="verified-news">
        <h2>Verified News</h2>
        <div id="news-container">
            <!-- Fallback script will insert news cards here -->
        </div>
    </section>

    <!-- TRENDING / UNVERIFIED NEWS -->
    <section class="trending-news">
        <h2>Hot Trending Topics</h2>
        <p>⚠️ These topics are trending online and may not yet be verified by official sources.</p>
        <div id="trending-container">
            <!-- Future AI or script can insert trending/unverified news here -->
        </div>
    </section>

    <!-- FOOTER -->
    <footer>
        &copy; 2026 AIPune Feed<br>
        News Heartbeat of the City
    </footer>

    <script src="script.js"></script>
</body>
</html>
